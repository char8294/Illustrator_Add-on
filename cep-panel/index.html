<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>AIO Exporter</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="panel">
        <header class="header">
            <div>
                <h1>AIO Exporter</h1>
                <p>Export selected formats</p>
            </div>
            <div class="header-actions">
                <button id="versionBadge" class="badge version-link" type="button" aria-label="Open GitHub repository" title="Open GitHub repository">v1.5.0</button>
                <button id="updateButton" class="icon-button update-button" type="button" aria-label="Check for updates" title="Check for updates">&#x2B73;</button>
            </div>
        </header>

        <section class="section">
            <div class="section-title">Shared</div>

            <label class="field-label" for="folderInput">Folder</label>
            <div class="field-row">
                <input id="folderInput" class="text-field" type="text" spellcheck="false">
                <button id="browseButton" class="icon-button folder-button" type="button" aria-label="Browse folder" title="Browse folder">
                    <span class="folder-icon" aria-hidden="true"></span>
                </button>
            </div>

            <label class="field-label" for="baseNameInput">Base name</label>
            <div class="field-row">
                <input id="baseNameInput" class="text-field" type="text" spellcheck="false">
                <button id="refreshDocumentButton" class="icon-button refresh-button" type="button" aria-label="Refresh active document" title="Refresh active document">&#x21BB;</button>
            </div>

            <label class="check-line">
                <input id="overwriteCheckbox" type="checkbox">
                <span>Overwrite existing files</span>
            </label>

            <div class="section-title">Artboards</div>
            <div class="artboard-picker">
                <div id="artboardCards" class="artboard-cards" aria-label="Artboards"></div>
                <div class="artboard-options">
                    <div class="select-caption">Select:</div>
                    <label class="radio-line">
                        <input id="artboardModeAll" name="artboardMode" type="radio" value="all" checked>
                        <span>All</span>
                    </label>
                    <label class="radio-line range-line">
                        <input id="artboardModeRange" name="artboardMode" type="radio" value="range">
                        <span>Range:</span>
                        <input id="artboardRangeInput" class="text-field range-field" type="text" placeholder="1-3" spellcheck="false">
                    </label>
                    <span id="artboardRangeNote" class="field-note">1</span>
                </div>
            </div>
        </section>

        <section class="section">
            <div class="section-title">Export formats</div>

            <div class="format-list">
                <div class="format-row" data-format-row="ai">
                    <label class="format-check">
                        <input id="formatAi" type="checkbox" checked>
                        <span class="format-extension">AI</span>
                        <span class="format-copy">
                            <span class="format-name">Editable source</span>
                            <span id="summaryAi" class="format-summary"></span>
                        </span>
                    </label>
                    <button class="icon-button settings-button" type="button" data-format="ai" aria-label="AI settings">&#9881;</button>
                </div>

                <div class="format-row" data-format-row="pdf">
                    <label class="format-check">
                        <input id="formatPdf" type="checkbox" checked>
                        <span class="format-extension">PDF</span>
                        <span class="format-copy">
                            <span class="format-name">Print/share file</span>
                            <span id="summaryPdf" class="format-summary"></span>
                        </span>
                    </label>
                    <button class="icon-button settings-button" type="button" data-format="pdf" aria-label="PDF settings">&#9881;</button>
                </div>

                <div class="format-row" data-format-row="png">
                    <label class="format-check">
                        <input id="formatPng" type="checkbox" checked>
                        <span class="format-extension">PNG</span>
                        <span class="format-copy">
                            <span class="format-name">Raster preview</span>
                            <span id="summaryPng" class="format-summary"></span>
                        </span>
                    </label>
                    <button class="icon-button settings-button" type="button" data-format="png" aria-label="PNG settings">&#9881;</button>
                </div>
            </div>
        </section>

        <button id="exportButton" class="primary-button" type="button">
            Export Selected
        </button>

        <p id="statusText" class="status" role="status">Ready</p>
    </main>

    <div id="settingsModal" class="modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-backdrop" data-close-modal></div>
        <section class="modal-card">
            <header class="modal-header">
                <h2 id="modalTitle">Settings</h2>
                <button class="icon-button" type="button" data-close-modal aria-label="Close settings">x</button>
            </header>
            <div id="modalBody" class="modal-body"></div>
            <footer class="modal-actions">
                <button id="modalDoneButton" class="primary-button compact" type="button">Done</button>
            </footer>
        </section>
    </div>

    <script src="js/CSInterface.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
